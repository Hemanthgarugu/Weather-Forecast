version: '3.8'

services:
  # Spring Boot Weather App Service
  weather-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: weather-app-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/weatherdb
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.PostgreSQLDialect
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - WEATHER_API_KEY=${WEATHER_API_KEY:-demo_key}
    depends_on:
      postgres-db:
        condition: service_healthy
    restart: always

  # PostgreSQL Database Service
  postgres-db:
    image: postgres:15-alpine
    container_name: weather-postgres-db
    environment:
      - POSTGRES_DB=weatherdb
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
